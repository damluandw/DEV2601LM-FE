<!DOCTYPE html>

    <head>

        <title>Trang chủ</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

                        </button>

                            id="navbarSupportedContent">
                            <form class="d-flex" role="search">
                                <input class="form-control" type="search"
                                    id="input-search"
                                    placeholder="Hôm nay bạn muốn ăn gì..."
                                    aria-label="Search" />
                                <button id="btn-search"
                                    class="btn btn-outline-success"
                                    type="submit"><i
                                        class="fa-solid fa-magnifying-glass"></i></button>
                            </form>
                            <ul class="navbar-nav mb-2 mb-lg-0">
                                <li class="nav-item">
                                    <a class="nav-link active"
                                        aria-current="page"
                                        href="#"><span><i
                                                class="fa-solid fa-house"></i></span><br><span>
                                            Trang chủ
                                        </span></a>
                                </li>
                                <li class="nav-item">

                                    <a class="nav-link"
                                        aria-current="page"
                                        href="#"><span><i
                                                class="fa-solid fa-circle-info"></i></span><br><span>
                                            Giới thiệu
                                        </span></a>
                                </li>
                                <li class="nav-item">

                                    <a class="nav-link"
                                        aria-current="page"
                                        href="#"><span><i
                                                class="fa-solid fa-gift"></i></span><br><span>
                                            Ưu đãi
                                        </span></a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link"
                                        aria-current="page"

                                                class="fa-solid fa-bullhorn"></i></span><br><span>

                                        </span></a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link"
                                        aria-current="page"
                                        href="#"><span><i
                                                class="fa-regular fa-envelope"></i></span><br><span>
                                            Liên hệ
                                        </span></a>
                                </li>

                            </ul>
                        </div>
                        <div>
                            <button type="submit"
                                class="btn bg-yellow text-white">
                                Đăng nhập
                            </button>
                            <button type="submit" class="btn cl-yellow">
                                Đăng ký
                            </button>
                        </div>
                    </div>
                </nav>
            </div>

                        <h4>Liên hệ</h4>

                        <address>
                            <span><i

                            <span><i class="fa-solid fa-phone"></i></span> <a

                            <span><i class="fa-solid fa-envelope"></i></span>
                            <a
                                href="mailto:info@adcvietnam.net">info@adcvietnam.net</a>
                        </p>
                        <p>
                            <span><i class="fa-solid fa-globe"></i></span><a

                        </p>
                    </div>

                        <h4>NewLetter</h4>
                        <p>
                            <span>Đăng ký để nhận ưu đãi hàng tháng</span>
                        </p>
                        <p>
                            <input placeholder="Nhập email" type="email"
                                name="email"
                                id="email">
                            <button type="submit"><i
                                    class="fa-regular fa-paper-plane"></i></button>
                        </p>
                        <p class="footer-icon">
                            <a href="#">

                            <a href="#"><i
                                    class="fa-2xl fa-brands fa-instagram"></i></a>

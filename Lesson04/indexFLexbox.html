<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Display Flex</title>
        <style>
            nav{
                display: flex;
                justify-content : space-between;
                align-items: center;
                background-color: #000;
                flex-wrap: wrap;
            }
            .logo{
                color: #fff;
            }

            .menu{
                display: flex;
                gap: 20px;
                list-style: none;              
            }

            .menu a{
                color: #fff;
                text-decoration: none;
                transition:  0.3s ;
            }
            .menu a:hover{
                color: rgb(4, 112, 25);
            }

            button{
                padding: 10px 20px;
                background-color: rgb(4, 112, 25);
                color: #fff;
                border: none;
                border-radius: 0px;
                cursor: pointer;
            }

           
        </style>
    </head>
    <body>
        <nav>
            <div class="logo">
                LOGO
            </div>
            <ul class="menu">
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Sản phẩm</a></li>
                <li><a href="#">Giới thiệu</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
            <div class="action">
                <button>Đăng nhập</button>
            </div>

        </nav>
    </body>
</html>

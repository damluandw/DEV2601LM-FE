<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Grid 2</title>
        <style>
            .layout{
                display: grid;
                grid-template-columns: 120px 1fr;
                grid-template-rows: 70px 1fr 50px;
                grid-template-areas:
                "header header"
                "sidebar main"
                "footer footer";
                gap: 20px;
                min-height: calc(100vh - 24px);
            }
            header{
                grid-area: header;
                background-color: #c9de07;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            aside{
                grid-area: sidebar;
                background-color: #d20d80;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            main{
                grid-area: main;
                background-color: #0a44ba;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            footer{
                grid-area: footer;
                background-color: #08a7dc;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <header>
                Header
            </header>
            <aside>
                Sidebar
            </aside>
            <main>
                Content
            </main>
            <footer>
                Footer
            </footer>
        </div>
    </body>
</html>

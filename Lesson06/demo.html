            // So sánh
            let a =5

            console.log("a==b:",a == b); // true: so sánh giá trị
            console.log("a===b:",a === b); // false: so sánh giá trị và kiểu dữ liệu

            // AND
            let age = 25;
            let isStudent = true;
            if(age > 18 && isStudent){
                console.log("Bạn là sinh viên và trên 18 tuổi");
            }

            // OR
            let isWeekend = true;
            let isHoliday = false;
            if(isWeekend || isHoliday){
                console.log("Hôm nay là cuối tuần hoặc ngày lễ");
            }
            // NOT
            let isRaining = false;
            console.log("isRaining:", isRaining);
             console.log("!isRaining:", !isRaining);

            }

            // Toán tử 3 ngôi
            (age >= 18) ? console.log("Bạn đủ tuổi để lái xe") : console.log("Bạn chưa đủ tuổi để lái xe");
            

            // kiểu giá trị
            console.log("Kiểu dữ liệu của age:", typeof age); // number
            console.log("Kiểu dữ liệu của isRaining:", typeof isRaining); // boolean
            console.log("Kiểu dữ liệu của user:", typeof user); // string

            // if else
            usename = "admin";

            if(usename === "admin" && password === "123456"){

            switch(month){

                    console.log("Tháng " + month + " có 31 ngày");

            }

            // for...of + for...in
            console.log("------------------------------");
            console.log("Sử dụng for...of:");
            for(let item of arr){
                console.log("Phần tử: ", item);
            }
             console.log("------------------------------");
             console.log("Sử dụng for...in:");
            for(let index in arr){
                console.log("Chỉ số: ", index);
                console.log("Giá trị: ", arr[index]);
            }

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>

        <h2>Tương tác bằng Jquerry</h2>
        <p class="para">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas,
            aspernatur exercitationem maxime consequatur corrupti iste eum
            reiciendis quod? Atque inventore quam obcaecati animi cupiditate
            delectus maxime dicta magnam eveniet aliquid.
        </p>
        <!-- Cách 1: Sử dụng jQuery -->
        <!-- <script src="js/jquery-4.0.0.min.js"></script> -->
        <!-- Cách 2: Sử dụng link online -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
            integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script>
            $(document).ready(function () {
                $("h2").hide();
                $("h2").show();
                $("p.para").css("color", "red");
                // Khi người dùng click vào đoạn văn bản
                $(".para").click(function () {
                    // Thay đổi màu nền của đoạn văn bản
                    $(this).css("background-color", "yellow");
                });
            });
        </script>
    </body>
</html>
